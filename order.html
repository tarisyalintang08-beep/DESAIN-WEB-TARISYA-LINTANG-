<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | L'ART DE TISSA</title>
    <link rel="stylesheet" href="style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="order-page">

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo-text">L'ART DE TISSA</a>
            <ul class="nav-menu">
                <li><a href="indek2.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="produk.html" class="nav-link">Produk</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="order.html" class="nav-link">Order</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="margin-top: 100px; padding: 0 8% 60px;">
        <section class="checkout-section">
            <h2 class="section-title">Finalize Your Order</h2>
            <div class="divider"></div>

            <div class="checkout-flex">
                <div class="cart-summary">
                    <h3>Shopping Bag</h3>
                    <div id="keranjangList" class="order-list">
                        </div>
                    <div class="total-box">
                        <span>Total Amount</span>
                        <span class="total-price">IDR <span id="totalHarga">0</span></span>
                    </div>
                </div>

                <div class="form-container">
                    <h3>Delivery Details</h3>
                    <form id="orderForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="nama" placeholder="Contoh: Tissa Putri" required>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>WhatsApp</label>
                                <input type="tel" id="wa" placeholder="0812..." required>
                            </div>
                            <div class="form-group">
                                <label>Payment</label>
                                <select id="pembayaran">
                                    <option value="BCA Transfer">BCA Transfer</option>
                                    <option value="E-Wallet (Dana/OVO)">E-Wallet (Dana/OVO)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Shipping Address</label>
                            <textarea id="alamat" rows="2" placeholder="Nama jalan, nomor rumah..." required></textarea>
                        </div>
                        <button type="button" class="btn-sage-order" onclick="buatStruk()">PLACE ORDER NOW</button>
                    </form>
                </div>
            </div>
        </section>

        <div id="strukOverlay" class="struk-overlay">
            <div class="struk-card">
                <div id="strukToDownload">
                    <div id="strukContent">
                        </div>
                </div>

                <div class="struk-actions">
                    <button id="btnDownload" class="btn-download-jpg" onclick="downloadStruk()">
                        <i class="fas fa-image"></i> Download Receipt (JPG)
                    </button>
                    
                    <button class="btn-back-shop" onclick="tutupStruk()">
                        Kembali Berbelanja
                    </button>
                    
                    <p style="text-align: center; font-size: 0.65rem; color: #888; margin-top: 10px;">
                        Tunggu sebentar setelah klik download.
                    </p>
                </div>
            </div>
        </div>
    </main>

   <script>
        // Ambil data dari Local Storage
        let keranjang = JSON.parse(localStorage.getItem('keranjang')) || [];

        // 1. Fungsi menampilkan produk di halaman checkout (DENGAN UPDATE QTY & HAPUS)
        function tampilKeranjang() {
            const list = document.getElementById('keranjangList');
            const totalElement = document.getElementById('totalHarga');
            if (!list) return;

            list.innerHTML = "";
            let total = 0;

            if (keranjang.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding: 20px; color: #aaa;">Keranjang kosong.</p>`;
                totalElement.innerText = "0";
                return;
            }

            keranjang.forEach((item, index) => {
                const subtotal = item.harga * item.qty;
                total += subtotal;
                
                // Menampilkan item dengan tombol tambah, kurang, dan hapus
                list.innerHTML += `
                    <div class="order-item" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #f0f0f0;">
                        <div class="order-item-info">
                            <span class="order-item-name" style="display:block; font-weight:600; color: var(--deep-sage);">${item.nama}</span>
                            <span class="order-item-price" style="font-size: 0.8rem; color: #888;">IDR ${item.harga.toLocaleString('id-ID')}</span>
                        </div>
                        
                        <div style="display:flex; align-items:center; gap: 10px;">
                            <div class="qty-controls" style="display:flex; align-items:center; gap: 8px; background: #f8f9f5; padding: 4px 8px; border-radius: 20px; border: 1px solid var(--soft-pink);">
                                <button onclick="ubahQty(${index}, -1)" class="qty-btn" style="width:24px; height:24px; border-radius:50%; border:none; background:#fff; cursor:pointer;">-</button>
                                <span style="font-weight:600; font-size:0.9rem; min-width:15px; text-align:center;">${item.qty}</span>
                                <button onclick="ubahQty(${index}, 1)" class="qty-btn" style="width:24px; height:24px; border-radius:50%; border:none; background:#fff; cursor:pointer;">+</button>
                            </div>
                            <i class="fas fa-trash-alt" onclick="hapusItem(${index})" style="color: #e74c3c; cursor: pointer; font-size: 0.9rem; margin-left: 5px; opacity: 0.7;"></i>
                        </div>
                    </div>`;
            });
            totalElement.innerText = total.toLocaleString('id-ID');
        }

        // Fungsi Update Quantity
        window.ubahQty = function(index, delta) {
            keranjang[index].qty += delta;
            
            if (keranjang[index].qty < 1) {
                hapusItem(index);
            } else {
                saveAndReload();
            }
        };

        // Fungsi Hapus Item
        window.hapusItem = function(index) {
            if(confirm("Hapus item ini dari keranjang?")) {
                keranjang.splice(index, 1);
                saveAndReload();
            }
        };

        // Simpan ke LocalStorage dan Refresh tampilan
        function saveAndReload() {
            localStorage.setItem('keranjang', JSON.stringify(keranjang));
            tampilKeranjang();
        }

        // 2. Fungsi Membuat Struk (Tetap Sama)
        function buatStruk() {
            const nama = document.getElementById('nama').value;
            const wa = document.getElementById('wa').value;
            const alamat = document.getElementById('alamat').value;
            const bayar = document.getElementById('pembayaran').value;

            if (!nama || !wa || !alamat || keranjang.length === 0) {
                alert("Lengkapi data formulir dan pastikan keranjang tidak kosong.");
                return;
            }

            // --- BAGIAN WAKTU ASLI ---
            const sekarang = new Date();
            const opsiTanggal = { year: 'numeric', month: 'long', day: 'numeric' };
            const tanggalFormatted = sekarang.toLocaleDateString('id-ID', opsiTanggal);
            
            // Ambil Jam dan Menit (Contoh: 09:40)
            const jam = sekarang.getHours().toString().padStart(2, '0');
            const menit = sekarang.getMinutes().toString().padStart(2, '0');
            const jamFormatted = `${jam}:${menit}`;
            // --------------------------

            const orderID = "LT-" + Math.floor(1000 + Math.random() * 9000);

            let grandTotal = 0;
            let produkHtml = "";

            keranjang.forEach(p => {
                const sub = p.harga * p.qty;
                produkHtml += `
                    <div class="product-item-row" style="display:flex; justify-content:space-between; font-size: 0.85rem; margin-bottom: 5px;">
                        <span>${p.nama} x${p.qty}</span>
                        <span>${sub.toLocaleString('id-ID')}</span>
                    </div>`;
                grandTotal += sub;
            });

            document.getElementById('strukContent').innerHTML = `
                <div class="struk-header-content">
                    <h3>L'ART DE TISSA</h3>
                    <p>Order ID: ${orderID}</p>
                    <p>${tanggalFormatted} | ${jamFormatted} WIB</p>
                </div>
                <div class="struk-id-row"><strong>Customer</strong> <span>${nama}</span></div>
                <div class="struk-id-row"><strong>WhatsApp</strong> <span>${wa}</span></div>
                <div class="struk-id-row"><strong>Payment</strong> <span>${bayar}</span></div>
                <div class="struk-id-row" style="margin-bottom:15px;"><strong>Address</strong> <span>${alamat}</span></div>
                <div style="border-top: 1px dashed #eee; padding-top: 10px; max-height: 180px; overflow-y: auto;">
                    ${produkHtml}
                </div>
                <div class="struk-total-box">
                    <span>TOTAL PAID</span>
                    <span class="grand-total">IDR ${grandTotal.toLocaleString('id-ID')}</span>
                </div>
                <div style="margin-top: 15px; background: #f0f4eb; padding: 10px; border-radius: 8px; font-size: 0.75rem; border: 1px solid #d8e3cc;">
                    <p style="color: #718355; font-weight: bold; margin-bottom: 4px;">METODE PEMBAYARAN:</p>
                    <p style="margin: 0;">${bayar === "BCA Transfer" ? "BCA: 15427394976 a/n Tissa" : "Dana/OVO: 0895618781807 a/n Tissa"}</p>
                </div>
            `;
            document.getElementById('strukOverlay').style.display = 'flex';
        }

        // 3. Fungsi Download Struk (Tetap Sama)
        function downloadStruk() {
            const btn = document.getElementById('btnDownload');
            btn.innerHTML = "Processing...";
            const element = document.getElementById('strukToDownload');

            html2canvas(element, {
                scale: 2,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Receipt-LartDeTissa.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
                btn.innerHTML = '<i class="fas fa-image"></i> Download Receipt (JPG)';
            });
        }

        // 4. Fungsi Tutup Struk
        function tutupStruk() {
            localStorage.removeItem('keranjang');
            window.location.href = "produk.html";
        }

        window.onload = tampilKeranjang;
    </script>
</body>
</html>
